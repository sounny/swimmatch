<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SwimMatch Dashboard</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f4f4f5;
        color: #111;
        margin: 0;
      }
      h1 {
        text-align: center;
        font-size: 1.5rem;
        margin: 1rem 0;
      }
      .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1rem;
        max-width: 1200px;
        margin: auto;
        padding: 1rem;
      }
      .panel {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 1rem;
      }
      label {
        display: block;
        font-size: 0.8rem;
        margin-top: 0.5rem;
      }
      input,
      select {
        width: 100%;
        padding: 0.2rem;
        font-size: 0.9rem;
      }
      #silhouette-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 280px;
      }
      svg#silhouette path,
      svg#silhouette rect,
      svg#silhouette circle {
        fill: #d4d4d8;
        stroke: #4b5563;
        stroke-width: 2;
      }
      .stats {
        font-size: 0.9rem;
        line-height: 1.4;
      }
      small {
        font-size: 0.75rem;
        color: #555;
      }
      #mini-strokes {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }
      .miniStroke {
        position: relative;
        height: 80px;
        background: #f1f5f9;
        border-radius: 6px;
        overflow: hidden;
      }
      .miniStroke::after {
        content: attr(data-label);
        position: absolute;
        bottom: 4px;
        left: 4px;
        font-size: 0.7rem;
        color: #555;
      }
      .miniStroke svg {
        width: 100%;
        height: 100%;
      }
      .wave {
        fill: #bae6fd;
      }
    </style>
  </head>
  <body>
    <h1>SwimMatch Prototype</h1>
    <div class="dashboard">
      <div class="panel">
        <label
          >Preset
          <select id="preset">
            <option value="">-- choose --</option>
          </select>
        </label>
        <label
          >Sex
          <select id="sex">
            <option value="M">Male</option>
            <option value="F">Female</option>
          </select>
        </label>
        <label>Age <input type="number" id="age" value="16" /></label>
        <label
          >Height (cm) <input type="number" id="height" value="180"
        /></label>
        <label
          >Weight (kg) <input type="number" id="weight" value="70"
        /></label>
        <label
          >Wingspan (cm) <input type="number" id="wingspan" value="180"
        /></label>
        <label
          >Torso length (cm) <input type="number" id="torso" value="70"
        /></label>
        <label
          >Leg length (cm) <input type="number" id="leg" value="90"
        /></label>
        <label
          >Shoulder width (cm) <input type="number" id="shoulder" value="40"
        /></label>
        <label>Waist (cm) <input type="number" id="waist" value="70" /></label>
        <label
          >Hand length (cm) <input type="number" id="hand" value="18"
        /></label>
        <label
          >Foot length (cm) <input type="number" id="foot" value="26"
        /></label>
      </div>
      <div class="panel" id="silhouette-container">
        <svg id="silhouette" viewBox="0 0 200 200">
          <g id="person">
            <circle cx="100" cy="20" r="10"></circle>
            <rect
              x="90"
              y="30"
              width="20"
              height="60"
              rx="8"
              id="torsoShape"
            ></rect>
            <rect
              x="0"
              y="40"
              width="90"
              height="10"
              rx="5"
              id="armLeft"
            ></rect>
            <rect
              x="110"
              y="40"
              width="90"
              height="10"
              rx="5"
              id="armRight"
            ></rect>
            <rect
              x="90"
              y="90"
              width="10"
              height="70"
              rx="5"
              id="legLeft"
            ></rect>
            <rect
              x="100"
              y="90"
              width="10"
              height="70"
              rx="5"
              id="legRight"
            ></rect>
          </g>
        </svg>
      </div>
      <div class="panel stats">
        <div><strong>BMI:</strong> <span id="bmi">-</span></div>
        <div>
          <strong>Ape Index (wingspan - height):</strong>
          <span id="ape">-</span> cm
        </div>
        <div>
          <strong>Suggested strokes:</strong> <span id="stroke">-</span>
        </div>
        <div>
          <strong>Suggested distances:</strong> <span id="distance">-</span>
        </div>
      </div>
      <div class="panel">
        <div id="mini-strokes">
          <div class="miniStroke" data-label="Freestyle">
            <svg viewBox="0 0 100 60">
              <rect class="wave" x="-100" y="40" width="100" height="5">
                <animate
                  attributeName="x"
                  from="-100"
                  to="100"
                  dur="2s"
                  repeatCount="indefinite"
                />
              </rect>
              <g class="miniPerson"></g>
            </svg>
          </div>
          <div class="miniStroke" data-label="Backstroke">
            <svg viewBox="0 0 100 60">
              <rect class="wave" x="-100" y="40" width="100" height="5">
                <animate
                  attributeName="x"
                  from="-100"
                  to="100"
                  dur="2s"
                  repeatCount="indefinite"
                />
              </rect>
              <g class="miniPerson"></g>
            </svg>
          </div>
          <div class="miniStroke" data-label="Breaststroke">
            <svg viewBox="0 0 100 60">
              <rect class="wave" x="-100" y="40" width="100" height="5">
                <animate
                  attributeName="x"
                  from="-100"
                  to="100"
                  dur="2s"
                  repeatCount="indefinite"
                />
              </rect>
              <g class="miniPerson"></g>
            </svg>
          </div>
          <div class="miniStroke" data-label="Butterfly">
            <svg viewBox="0 0 100 60">
              <rect class="wave" x="-100" y="40" width="100" height="5">
                <animate
                  attributeName="x"
                  from="-100"
                  to="100"
                  dur="2s"
                  repeatCount="indefinite"
                />
              </rect>
              <g class="miniPerson"></g>
            </svg>
          </div>
        </div>
        <small>Silhouettes and water flow update with your dimensions.</small>
      </div>
      <div class="panel stats">
        <p>
          These suggestions do not limit you to any stroke or event—dedication
          and training matter most.
        </p>
      </div>
    </div>
    <script src="metrics.js"></script>
    <script src="main.js"></script>
  </body>
</html>
