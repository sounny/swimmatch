<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SwimMatch Dashboard</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f4f4f5;
        color: #111;
        margin: 0;
      }
      h1 {
        text-align: center;
        font-size: 1.5rem;
        margin: 1rem 0;
      }
      .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1rem;
        max-width: 1200px;
        margin: auto;
        padding: 1rem;
      }
      .panel {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 1rem;
      }
      label {
        display: block;
        font-size: 0.8rem;
        margin-top: 0.5rem;
      }
      input,
      select {
        width: 100%;
        padding: 0.2rem;
        font-size: 0.9rem;
      }
      #silhouette-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 280px;
      }
      svg#silhouette path,
      svg#silhouette rect,
      svg#silhouette circle,
      .miniStroke svg path,
      .miniStroke svg rect,
      .miniStroke svg circle {
        fill: #d4d4d8;
        stroke: #4b5563;
        stroke-width: 2;
      }
      .stats {
        font-size: 0.9rem;
        line-height: 1.4;
      }
      small {
        font-size: 0.75rem;
        color: #555;
      }
      #mini-strokes {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
      }
      .miniStroke {
        position: relative;
        height: 80px;
        background: #f1f5f9;
        border-radius: 6px;
        overflow: hidden;
      }
      .miniStroke::after {
        content: attr(data-label);
        position: absolute;
        bottom: 4px;
        left: 4px;
        font-size: 0.7rem;
        color: #555;
      }
      .miniStroke svg {
        width: 100%;
        height: 100%;
      }
      .wave {
        fill: #bae6fd;
      }
    </style>
  </head>
  <body>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      style="position: absolute; width: 0; height: 0"
    >
      <defs>
        <g id="swimmerShape">
          <circle cx="100" cy="20" r="10"></circle>
          <path
            d="M95 30 L105 30 C110 50 110 70 105 90 L95 90 C90 70 90 50 95 30Z"
          ></path>
          <path d="M95 40 L15 50 L15 60 L95 50Z"></path>
          <path d="M105 40 L185 50 L185 60 L105 50Z"></path>
          <path d="M95 90 L90 160 L96 160 L100 90Z"></path>
          <path d="M105 90 L110 160 L104 160 L100 90Z"></path>
        </g>
      </defs>
    </svg>
    <h1>SwimMatch Prototype</h1>
    <div class="dashboard">
      <div class="panel">
        <label
          >Preset
          <select id="preset">
            <option value="">-- choose --</option>
          </select>
        </label>
        <label
          >Sex
          <select id="sex">
            <option value="M">Male</option>
            <option value="F">Female</option>
          </select>
        </label>
        <label>Age <input type="number" id="age" value="16" /></label>
        <label
          >Height (cm) <input type="number" id="height" value="180"
        /></label>
        <label
          >Weight (kg) <input type="number" id="weight" value="70"
        /></label>
        <label
          >Wingspan (cm) <input type="number" id="wingspan" value="180"
        /></label>
        <label
          >Torso length (cm) <input type="number" id="torso" value="70"
        /></label>
        <label
          >Leg length (cm) <input type="number" id="leg" value="90"
        /></label>
        <label
          >Shoulder width (cm) <input type="number" id="shoulder" value="40"
        /></label>
        <label>Waist (cm) <input type="number" id="waist" value="70" /></label>
        <label
          >Hand length (cm) <input type="number" id="hand" value="18"
        /></label>
        <label
          >Foot length (cm) <input type="number" id="foot" value="26"
        /></label>
      </div>
      <div class="panel" id="silhouette-container">
        <svg id="silhouette" viewBox="0 0 200 200">
          <g id="person"><use href="#swimmerShape"></use></g>
        </svg>
      </div>
      <div class="panel stats">
        <div><strong>BMI:</strong> <span id="bmi">-</span></div>
        <div>
          <strong>Ape Index (wingspan - height):</strong>
          <span id="ape">-</span> cm
        </div>
        <div>
          <strong>Suggested strokes:</strong> <span id="stroke">-</span>
        </div>
        <div>
          <strong>Suggested distances:</strong> <span id="distance">-</span>
        </div>
      </div>
      <div class="panel">
        <div id="mini-strokes">
          <div class="miniStroke" data-label="Freestyle">
            <svg viewBox="0 0 100 60">
              <rect class="wave" x="-100" y="40" width="100" height="5">
                <animate
                  attributeName="x"
                  from="-100"
                  to="100"
                  dur="2s"
                  repeatCount="indefinite"
                />
              </rect>
              <g class="miniPerson"><use href="#swimmerShape"></use></g>
            </svg>
          </div>
          <div class="miniStroke" data-label="Backstroke">
            <svg viewBox="0 0 100 60">
              <rect class="wave" x="-100" y="40" width="100" height="5">
                <animate
                  attributeName="x"
                  from="-100"
                  to="100"
                  dur="2s"
                  repeatCount="indefinite"
                />
              </rect>
              <g class="miniPerson"><use href="#swimmerShape"></use></g>
            </svg>
          </div>
          <div class="miniStroke" data-label="Breaststroke">
            <svg viewBox="0 0 100 60">
              <rect class="wave" x="-100" y="40" width="100" height="5">
                <animate
                  attributeName="x"
                  from="-100"
                  to="100"
                  dur="2s"
                  repeatCount="indefinite"
                />
              </rect>
              <g class="miniPerson"><use href="#swimmerShape"></use></g>
            </svg>
          </div>
          <div class="miniStroke" data-label="Butterfly">
            <svg viewBox="0 0 100 60">
              <rect class="wave" x="-100" y="40" width="100" height="5">
                <animate
                  attributeName="x"
                  from="-100"
                  to="100"
                  dur="2s"
                  repeatCount="indefinite"
                />
              </rect>
              <g class="miniPerson"><use href="#swimmerShape"></use></g>
            </svg>
          </div>
        </div>
        <small>Silhouettes and water flow update with your dimensions.</small>
      </div>
      <div class="panel">
        <h2>Coach Tests</h2>
        <label>25m time (s) <input type="number" id="t25" step="0.01" /></label>
        <label>25m strokes <input type="number" id="s25" step="1" /></label>
        <button id="save25">Save 25m</button>
        <div id="out25"></div>
        <hr />
        <label
          >200m time (s) <input type="number" id="t200" step="0.01"
        /></label>
        <label
          >400m time (s) <input type="number" id="t400" step="0.01"
        /></label>
        <button id="calcCSS">Calc CSS</button>
        <div id="outCSS"></div>
      </div>
      <div class="panel stats">
        <p>
          These suggestions do not limit you to any stroke or event—dedication
          and training matter most.
        </p>
      </div>
    </div>
    <script src="metrics.js"></script>
    <script src="main.js"></script>
  </body>
</html>
